# Worked example for a server repo: apps/users/docker-compose.yml
# (vps-base-template estate layout; adjust paths if yours differs).
services:
  users:
    # Pin by digest in your server repo (Renovate's pinDigests does this).
    image: ghcr.io/uppertoe/vps-user-portal:latest
    restart: unless-stopped
    # Runs as the users-file owner (uid 1000 = deploy in the estate layout) so
    # it can write the shared Authelia users directory.
    user: "1000:1000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 128m
    pids_limit: 128
    env_file:
      - path: ./.env
        required: false # keep `docker compose config` valid in CI without a real .env
    environment:
      - DOMAIN=${DOMAIN}
      - SSO_URL=https://sso.${DOMAIN}
      - USERS_FILE=/authelia-users/users_database.yml
      - PROVISIONERS_FILE=/config/provisioners.yaml
    volumes:
      # The Authelia users DIRECTORY (shared rw with the authelia container;
      # single-file mounts break atomic-rename hot reload — see README).
      - ../authelia/users:/authelia-users
      - ./provisioners.yaml:/config/provisioners.yaml:ro
    # Proxy-network wiring is generated (.generated/caddy/networks.yml): the
    # portal joins its own users_proxy network, which Caddy also joins.
    #
    # For DB access the portal joins a DEDICATED users_db network that ONLY
    # planka-db also joins — NOT planka_internal. This matters: the portal
    # trusts Caddy-injected Remote-User/Remote-Groups headers, which is safe
    # only while Caddy is the sole route to it. If the portal shared
    # planka_internal, the Planka APP container (the least-hardened service on
    # the box) could reach http://users:8080/ directly with a forged
    # `Remote-Groups: admin` and seize the SSO user store. A dedicated db-only
    # network removes that path entirely: the portal reaches Postgres, and
    # neither portal<->planka-app direction exists. See README "Trust model".
    networks:
      - users_db
    healthcheck:
      test: ["CMD", "/app", "-healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

# A dedicated app<->db network for the portal. In the server repo you also add
# `users_db` to the `planka-db` service's networks list in
# apps/planka/docker-compose.yml (planka-db then sits on planka_internal AND
# users_db; the Planka APP stays on planka_internal only). planka-db publishes
# no ports and the `invite` Postgres role is INSERT/limited-UPDATE only, so this
# network's blast radius is one narrowly-scoped DB role.
networks:
  users_db: {}
